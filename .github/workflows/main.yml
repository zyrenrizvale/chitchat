name: Release Chitchat App

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Apa yang baru? (Changelog)'
        required: true
        default: '- Perbaikan bug & Pembaruan UI'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Tarik Kodingan
        uses: actions/checkout@v3

      - name: Siapkan Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Beri Izin Eksekusi Gradle
        run: chmod +x gradlew

      - name: Hapus Settingan Java Windows
        run: sed -i '/org.gradle.java.home/d' gradle.properties || true

      - name: Menetapkan Versi Otomatis (Auto-Increment)
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Rakit APK
        run: ./gradlew assembleDebug

      - name: Kirim ke Telegram
        run: |
          NAMA_FILE="Chitchat_v${{ env.VERSION_NAME }}_b${{ env.VERSION_CODE }}.apk"
          # Karena belum ada keystore (signing), kita gunakan versi debug sementara
          cp app/build/outputs/apk/debug/app-debug.apk "$NAMA_FILE"
          
          PESAN="🚀 *UPDATE CHITCHAT TERSEDIA!* 🚀%0A%0A*Versi:* ${{ env.VERSION_NAME }} (Build ${{ env.VERSION_CODE }})%0A*Apa yang baru:*%0A${{ github.event.inputs.changelog }}"
          
          # Mengirim ke Chat ID yang sama seperti referensi
          for ID in 6071587883 7520038758; do
            curl -F document=@"$NAMA_FILE" \
                 -F caption="$PESAN" \
                 "https://api.telegram.org/bot8825507034:AAHKGjBB6um-i0BWhz1USKQcITKqF-dGhDs/sendDocument?chat_id=$ID"
          done

      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.VERSION_CODE }}"
          name: "Chitchat Update v${{ env.VERSION_NAME }}"
          body: "${{ github.event.inputs.changelog }}"
          files: "Chitchat_v${{ env.VERSION_NAME }}_b${{ env.VERSION_CODE }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
